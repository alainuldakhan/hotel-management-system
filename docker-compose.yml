services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hotel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hotel_management}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (.NET 10) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend/hotel-management-system
      dockerfile: Dockerfile
    container_name: hotel-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB:-hotel_management};
        Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      JwtSettings__SecretKey: ${JwtSettings__SecretKey:-super-secret-key-change-in-production-32ch}
      EmailSettings__IsEnabled: ${EmailSettings__IsEnabled:-false}
      EmailSettings__SmtpUsername: ${EmailSettings__SmtpUsername:-}
      EmailSettings__SmtpPassword: ${EmailSettings__SmtpPassword:-}
      EmailSettings__FromEmail: ${EmailSettings__FromEmail:-noreply@hotel.com}
    ports:
      - "5151:5151"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend (React + nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: hotel-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
